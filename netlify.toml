# Хостинг Comfy Eden на Netlify (репозиторий остаётся приватным).
# На прод уходит ТОЛЬКО сайт: index.html, privacy.html, assets/.
# Документы (SPEC/PLAN/TASK), .claude и .github не публикуются.

[build]
  command = "rm -rf _site && mkdir -p _site && cp index.html privacy.html _site/ && cp -r assets _site/"
  publish = "_site"

[build.environment]
  NODE_VERSION = "20"

# Заголовки безопасности (необязательно, но полезно)
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
